<!-- Page principale affichant la liste des photographes -->

<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
 
  <link href="css/style.css" rel="stylesheet" type="text/css" >
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css?family=DM+Sans&display=swap" rel="stylesheet">
  <title>FishEye</title>
</head>

<body>
  <header>
    <!-- Accessibilité : alt simplifié pour éviter la répétition "logo" lue par les lecteurs d’écran. -->
    <img src="assets/images/logo.png" class="logo" alt="FishEye" width="512" height="128">
    <h1>Nos photographes</h1>
  </header>
  <main id="main">
    <!-- Accessibilité : section sémantique avec un nom accessible pour la liste des photographes. -->
    <section class="photographer_section" aria-label="Liste des photographes"></section>
  </main>
  <script type="module" src="scripts/templates/photographer.js"></script>
  <script type="module" src="scripts/pages/index.js"></script>
</body>

</html>
